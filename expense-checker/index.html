<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>経費精算チェックツール</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- SheetJS (xlsx) CDN -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
    <!-- Background glow spheres -->
    <div class="glow-sphere glow-1"></div>
    <div class="glow-sphere glow-2"></div>

    <div class="container">
        <header>
            <h1>経費精算チェックツール</h1>
            <p class="subtitle">Excelファイルをアップロードして、規約違反や申請不備を自動でチェックします</p>
        </header>

        <!-- Upload Card -->
        <div class="card" id="upload-card">
            <div class="upload-zone" id="drop-zone">
                <span class="material-icons upload-icon">cloud_upload</span>
                <div class="upload-text">経費精算のExcelファイルをドラッグ＆ドロップ</div>
                <div class="upload-hint">またはファイルを選択（.xls, .xlsx）</div>
                <input type="file" id="file-input" accept=".xls,.xlsx">
            </div>
        </div>

        <!-- Loading State -->
        <div class="card hidden" id="loading-state">
            <div class="loader"></div>
            <p style="text-align: center; color: var(--text-secondary);">エクセルファイルを解析中...</p>
        </div>

        <!-- Empty State -->
        <div class="empty-state" id="empty-state">
            <p>チェックするファイルをアップロードしてください。</p>
        </div>

        <!-- Dashboard Result Panel -->
        <div class="dashboard-grid hidden" id="dashboard-result">
            <!-- Sidebar: Details and Issues -->
            <div class="summary-container">
                <!-- Status summary -->
                <div class="summary-card" id="status-card">
                    <span class="summary-label">判定ステータス</span>
                    <span class="summary-val status-ok" id="status-value">良好</span>
                </div>

                <!-- Info Cards -->
                <div class="summary-card">
                    <span class="summary-label">申請者</span>
                    <span class="summary-val" id="val-applicant">-</span>
                </div>
                <div class="summary-card">
                    <span class="summary-label">社員番号</span>
                    <span class="summary-val" id="val-emp-id">-</span>
                </div>
                <div class="summary-card">
                    <span class="summary-label">申請日</span>
                    <span class="summary-val" id="val-date">-</span>
                </div>
                <div class="summary-card">
                    <span class="summary-label">所属</span>
                    <span class="summary-val" style="font-size: 1.1rem;" id="val-dept">-</span>
                </div>
                <div class="summary-card">
                    <span class="summary-label">合計金額 (申告)</span>
                    <span class="summary-val total-amount" id="val-amount">¥0</span>
                </div>

                <!-- Issue Filters and List -->
                <div class="card" style="padding: 1.25rem; margin-bottom: 0;">
                    <div class="tabs">
                        <button class="tab-btn active" data-tab="all">
                            すべて
                        </button>
                        <button class="tab-btn" data-tab="errors">
                            エラー <span class="alert-count-badge" id="error-count">0</span>
                        </button>
                        <button class="tab-btn" data-tab="warnings">
                            警告 <span class="warning-count-badge" id="warning-count">0</span>
                        </button>
                    </div>
                    <div class="issues-list" id="issues-list">
                        <!-- Filled by JS -->
                    </div>
                </div>
            </div>

            <!-- Spreadsheet Details View -->
            <div class="card" style="display: flex; flex-direction: column; overflow: hidden; height: 100%;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h2 style="font-size: 1.25rem; font-weight: 700;">明細一覧データ</h2>
                    <div style="font-size: 0.85rem; color: var(--text-secondary);">※不備のある行をクリックすると詳細を表示します。</div>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead id="table-header">
                            <!-- Filled by JS -->
                        </thead>
                        <tbody id="table-body">
                            <!-- Filled by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
